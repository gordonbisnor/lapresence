name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test
      DATABASE_URL: mysql2://root:@127.0.0.1:3306/lapresence_test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: lapresence_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.6'
          bundler-cache: true # runs `bundle install` and caches gems automatically

      - name: Install Chrome for Capybara
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Set up database
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Precompile assets
        run: bin/rails assets:precompile
        # Remove this step if your app doesn't need precompiled assets for tests
        # (e.g. Capybara feature specs relying on compiled JS/CSS)

      - name: Run RSpec suite
        run: bundle exec rspec spec --format progress

      - name: Upload Capybara screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capybara-screenshots
          path: tmp/capybara
          if-no-files-found: ignore